<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Customer Reviews</h1>
        
        <div id="reviews-container" class="grid gap-4">
            <p class="text-gray-500 italic">Loading reviews...</p>
        </div>
    </div>

    <script>
        async function loadReviews() {
            const container = document.getElementById('reviews-container');
            
            try {
                // Fetch the JSON file sitting next to this HTML
                const response = await fetch('review.json');
                
                if (!response.ok) {
                    throw new Error('Could not find review.json');
                }

                const data = await response.json();
                
                // Clear the loading message
                container.innerHTML = '';

                // Loop through the data and create HTML for each review
                // Assumes your JSON is an array of objects
                data.forEach(review => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500";
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-xl font-semibold text-gray-900">${review.author || 'Anonymous'}</h2>
                            <span class="text-yellow-500 font-bold">${'★'.repeat(review.rating || 5)}</span>
                        </div>
                        <p class="text-gray-600 italic">"${review.comment || 'No comment provided.'}"</p>
                        <p class="text-sm text-gray-400 mt-4">${review.date || ''}</p>
                    `;
                    
                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = `
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                        <strong>Error:</strong> ${error.message}. <br>
                        <small>Make sure you're using a local server (http://) and not opening the file directly (file://).</small>
                    </div>`;
            }
        }

        // Initialize
        loadReviews();
    </script>
</body>
</html>
